name: Reusable Salesforce Pipeline

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      SF_DEV_AUTH_URL:
        required: false
      SF_INT_AUTH_URL:
        required: false
      SF_PROD_AUTH_URL:
        required: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Verify Salesforce CLI
        run: sf --version

      - name: Create Auth File
        shell: bash
        env:
          SF_DEV_AUTH_URL: ${{ secrets.SF_DEV_AUTH_URL }}
          SF_INT_AUTH_URL: ${{ secrets.SF_INT_AUTH_URL }}
          SF_PROD_AUTH_URL: ${{ secrets.SF_PROD_AUTH_URL }}
        run: |
          if [ "${{ inputs.environment }}" = "dev" ]; then
            printf "%s\n" "$SF_DEV_AUTH_URL" > auth.txt
          elif [ "${{ inputs.environment }}" = "int" ]; then
            printf "%s\n" "$SF_INT_AUTH_URL" > auth.txt
          elif [ "${{ inputs.environment }}" = "main" ]; then
            printf "%s\n" "$SF_PROD_AUTH_URL" > auth.txt
          fi

      - name: Check Auth File Size
        run: |
          ls -l auth.txt
          wc -c auth.txt

      - name: Authenticate Salesforce Org
        run: |
          sf org login sfdx-url --sfdx-url-file auth.txt --alias target-org
          rm -f auth.txt

      - name: Verify Authentication
        run: |
          sf org display --target-org target-org

      - name: Validate PR Template
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python scripts/validate-pr.py
     
      - name: Install SFDX Git Delta
        run: |
          echo y | sf plugins install sfdx-git-delta

      - name: Generate Delta Package
        run: |
          mkdir -p delta
          sf sgd source delta \
            --from HEAD~1 \
            --to HEAD \
            --output-dir delta

      - name: Generate Rollback Package
        run: |
          bash scripts/rollback.sh
      # comments belwo lines no Apex class are testing       
     # - name: Extract Test Classes
      #   run: |
      #     python scripts/extract-tests.py > tests.txt

      # - name: Display Test Classes
      #   run: |
      #     cat tests.txt

      # - name: Run Apex Tests
      #   run: |
      #     TESTS=$(cat tests.txt)
      #
      #     sf apex run test \
      #       --tests "$TESTS" \
      #       --code-coverage \
      #       --wait 30 \
      #       -o target-org

            
      - name: Deploy Delta to DEV
        if: github.event_name == 'push'
        run: |
          sf project deploy start \
            --source-dir delta \
            --target-org target-org
      - name: Display Delta Files
        run: |
          ls -R delta || true

      - name: Install Salesforce Code Analyzer
        run: |
          sf plugins install @salesforce/sfdx-scanner

      - name: Run Code Analyzer
        run: |
          sf scanner run \
            --target force-app \
            --format table

      - name: Upload Delta Package
        uses: actions/upload-artifact@v4
        with:
          name: delta-package-${{ inputs.environment }}
          path: delta
