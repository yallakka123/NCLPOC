name: Reusable Salesforce Auth

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (dev|int|main)'
        required: true
        type: string

jobs:
  authenticate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli

      - name: Select Authentication URL
        env:
          SF_DEV_AUTH_URL: ${{ secrets.SF_DEV_AUTH_URL }}
          SF_INT_AUTH_URL: ${{ secrets.SF_INT_AUTH_URL }}
          SF_PROD_AUTH_URL: ${{ secrets.SF_PROD_AUTH_URL }}
        run: |
          if [ "${{ inputs.environment }}" = "dev" ]; then
            echo "$SF_DEV_AUTH_URL" > auth.txt
          elif [ "${{ inputs.environment }}" = "int" ]; then
            echo "$SF_INT_AUTH_URL" > auth.txt
          elif [ "${{ inputs.environment }}" = "main" ]; then
            echo "$SF_PROD_AUTH_URL" > auth.txt
          fi

      - name: Check Auth File
        run: |
          echo "Auth file created"
          ls -l auth.txt
          wc -c auth.txt

      - name: Debug SF CLI installation
        run: |
          echo "--- Environment info ---"
          node --version || true
          npm --version || true
          echo "--- Global npm packages ---"
          npm list -g --depth=0 || true
          echo "--- PATH ---"
          echo "$PATH"
          echo "--- which sf ---"
          which sf || true
          echo "--- head of sf executable (if present) ---"
          if which sf >/dev/null 2>&1; then
            head -n 80 "$(which sf)" || true
          fi
          echo "--- sf --version (may fail) ---"
          sf --version || true

      - name: Authenticate Salesforce Org
        run: |
          sf org login sfdx-url \
            --sfdx-url-file auth.txt \
            --alias target-org

      - name: Verify Authentication
        run: |
          sf org display --target-org target-org
