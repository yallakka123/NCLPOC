name: Salesforce Authentication Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Salesforce Environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - int
          - prod

      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: 22

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Select Auth URL
        shell: bash
        run: |
          if [ "${{ github.event.inputs.environment }}" = "dev" ]; then
            echo "${{ secrets.SF_DEV_AUTH_URL }}" > auth.txt
          elif [ "${{ github.event.inputs.environment }}" = "int" ]; then
            echo "${{ secrets.SF_INT_AUTH_URL }}" > auth.txt
          else
            echo "${{ secrets.SF_PROD_AUTH_URL }}" > auth.txt
          fi

      - name: Authenticate Org
        run: |
          sf org login sfdx-url \
            --sfdx-url-file auth.txt \
            --alias target-org

      - name: Verify Authentication
        run: |
          sf org display --target-org target-org

jobs:
  authenticate:
    runs-on: ubuntu-latest

